<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RIZWAN-MDX | Pairing</title>
<style>body{background:#0a0a0f;color:#fff;font-family:'Poppins',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}.box{background:#111;border:1px solid #0ff;padding:40px;border-radius:20px;box-shadow:0 0 30px #0ff;text-align:center;width:380px;max-width:90%}h1{color:#0ff;text-shadow:0 0 10px #0ff}input{width:90%;padding:12px;margin:10px 0;border:none;border-radius:10px;background:#1a1a1f;color:#0ff;font-size:16px;outline:none}button{padding:12px 25px;border:none;border-radius:10px;background:#0ff;color:#000;font-weight:bold;cursor:pointer;width:95%;margin-top:10px}button:hover{box-shadow:0 0 20px #0ff}#code,#session{margin-top:20px;font-size:16px;color:#0ff;word-break:break-all;background:#1a1a1f;padding:10px;border-radius:10px}textarea{width:90%;height:80px;margin-top:10px;background:#1a1a1f;color:#0ff;border:1px solid #0ff;border-radius:10px;padding:10px;font-family:monospace}</style>
</head><body><div class="box"><h1>RIZWAN-MDX BOT</h1><p>92 ke sath number dalo</p><input id="num" placeholder="923436259742"><button onclick="pair()">Get Code / Session</button><div id="code"></div><textarea id="session" readonly placeholder="SESSION_ID yahan aayega..."></textarea><button onclick="navigator.clipboard.writeText(document.getElementById('session').value)">Copy SESSION_ID</button></div><script>async function pair(){const num=document.getElementById('num').value;document.getElementById('code').innerText='Connecting...';document.getElementById('session').value='';const res=await fetch('/code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({number:num})});const data=await res.json();if(data.code)document.getElementById('code').innerText=`Code: ${data.code} -> WhatsApp > Linked Devices > Link with Phone Number`;if(data.session){document.getElementById('code').innerText='Connected ✅';document.getElementById('session').value=data.session;}if(data.error)document.getElementById('code').innerText='Error: '+data.error;}</script></body></html>
